name: crowdsecurity/crs-exclusion-plugin-google-oauth2

# This appsec-rule is only here to make crowdsec download the datafiles, inclusion is done by the CRS appsec-rules

data:
  - source_url: https://hub-data.crowdsec.net/appsec/crs-plugins/google-oauth2-exclusion-plugin/google-oauth2-before.conf
    dest_file: crs-plugins/google-oauth2/google-oauth2-before.conf
    type: modsec
  - source_url: https://hub-data.crowdsec.net/appsec/crs-plugins/google-oauth2-exclusion-plugin/google-oauth2-config.conf
    dest_file: crs-plugins/google-oauth2/google-oauth2-config.conf
    type: modsec