name: HubTest
on:
  pull_request:
    branches: [ master ]
    paths:
      - 'contexts/**.yaml'
      - 'contexts/**.yml'
      - 'parsers/**.yaml'
      - 'parsers/**.yml'
      - 'postoverflows/**.yaml'
      - 'postoverflows/**.yml'
      - 'scenarios/**.yaml'
      - 'scenarios/**.yml'
      - '.github/workflows/**.yaml'
      - '.github/workflows/**.yml'
      - '.tests/**'
      - '!.github/workflows/update_taxonomy.yaml'
  push:
    branches: [ master ]
    paths:
      - 'contexts/**.yaml'
      - 'contexts/**.yml'
      - 'parsers/**.yaml'
      - 'parsers/**.yml'
      - 'postoverflows/**.yaml'
      - 'postoverflows/**.yml'
      - 'scenarios/**.yaml'
      - 'scenarios/**.yml'
      - '.github/workflows/**.yaml'
      - '.github/workflows/**.yml'
      - '.tests/**'
      - '!.github/workflows/update_taxonomy.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run-hub-tests:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/crowdsecurity/crowdsec:dev
      options: "--entrypoint bash"
      env:
        DISABLE_LOCAL_API: "true"
    env:
      RESULTS_PATH: .
    outputs:
      parsers_cov: ${{ steps.coverage.outputs.parsers_cov }}
      scenarios_cov: ${{ steps.coverage.outputs.scenarios_cov }}
      parser_color: ${{ steps.coverage.outputs.parser_color }}
      scenario_color: ${{ steps.coverage.outputs.scenario_color }}
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: run tests with crowdsec from master branch
      id: coverage
      run: |
        mkdir -p /etc/crowdsec && cp -r /staging/etc/* /etc/
        cscli hubtest run --all --clean --max-jobs 8
        PARSERS_COV=$(cscli hubtest coverage --parsers --percent | cut -d '=' -f2)
        SCENARIOS_COV=$(cscli hubtest coverage --scenarios --percent | cut -d '=' -f2)
        PARSERS_COV_NUMBER=$(echo "$PARSERS_COV" | tr -d '%' | tr -d '[:space:]')
        SCENARIOS_COV_NUMBER=$(echo "$SCENARIOS_COV" | tr -d '%' | tr -d '[:space:]')
        {
          echo "parsers_cov=$PARSERS_COV"
          echo "scenarios_cov=$SCENARIOS_COV"
          echo "parser_color=$(if [ "$PARSERS_COV_NUMBER" -lt "70" ]; then echo 'red'; else echo 'green'; fi)"
          echo "scenario_color=$(if [ "$SCENARIOS_COV_NUMBER" -lt "70" ]; then echo 'red'; else echo 'green'; fi)"
        } >> "$GITHUB_OUTPUT"

  update-badges:
    needs: run-hub-tests
    if: ${{ github.ref == 'refs/heads/master' && github.repository_owner == 'crowdsecurity' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    - name: Update coverage badges
      env:
        GH_TOKEN: ${{ secrets.GIST_BADGES_SECRET }}
        GIST_ID: ${{ secrets.GIST_BADGES_ID }}
        PARSERS_COV: ${{ needs.run-hub-tests.outputs.parsers_cov }}
        SCENARIOS_COV: ${{ needs.run-hub-tests.outputs.scenarios_cov }}
        PARSER_COLOR: ${{ needs.run-hub-tests.outputs.parser_color }}
        SCENARIO_COLOR: ${{ needs.run-hub-tests.outputs.scenario_color }}
      run: |
        set -euo pipefail
        badge() { jq -cn --arg l "$1" --arg m "$2" --arg c "$3" \
          '{schemaVersion:1,label:$l,message:$m,color:$c}'; }
        jq -n \
          --arg p "$(badge 'Hub Parsers'   "$PARSERS_COV"   "$PARSER_COLOR")" \
          --arg s "$(badge 'Hub Scenarios' "$SCENARIOS_COV" "$SCENARIO_COLOR")" \
          '{files:{"hub_parsers_badge.json":{content:$p},
                   "hub_scenarios_badge.json":{content:$s}}}' \
          | gh api --method PATCH "/gists/${GIST_ID}" --input -

