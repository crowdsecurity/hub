name: crowdsecurity/appsec-bot-challenge-exclude-static
# Let static assets (styles, scripts, sourcemaps, images, fonts, audio/video) and the two browser
# metadata files fly through without a challenge. A challenge page returned for a subresource breaks
# page rendering for real users, and these carry no content worth gating. Downloads/documents
# (pdf, zip, ...) are deliberately NOT exempted, as they may be the gated content itself.
inband:
  pre_eval:
    - filter: >-
        req.URL.Path matches '(?i)\.(css|js|mjs|map|png|jpe?g|gif|svg|webp|avif|ico|bmp|woff2?|ttf|otf|eot|mp4|m4v|webm|mov|mp3|m4a|wav|ogg|oga|ogv|flac|aac|webmanifest)$' ||
        req.URL.Path in ['/manifest.json', '/browserconfig.xml']
      apply:
        - ExemptFromChallenge()
