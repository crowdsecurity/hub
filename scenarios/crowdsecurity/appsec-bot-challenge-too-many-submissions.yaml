type: leaky
format: 3.0
#debug: true
name: crowdsecurity/appsec-bot-challenge-too-many-submissions
description: "Client made too many submissions for challenge"
filter: "evt.Meta.log_type == 'appsec-challenge' && evt.Meta.challenge_event == 'submitted'"
leakspeed: "20s"
capacity: 5
groupby: evt.Meta.source_ip
blackhole: 1m
labels:
  service: http
  confidence: 0
  spoofable: 0
  classification:
    - attack.T1110
  label: "Blocked by CrowdSec AppSec"
  behavior: "http:exploit"
  remediation: true
