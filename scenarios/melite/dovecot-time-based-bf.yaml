# Time-based Dovecot bruteforce detection
# Tier 3: Detects evasive attacks with >= 20min median interval
# Complements melite/dovecot-slow-bf (Tier 2) and crowdsecurity/dovecot-spam (Tier 1)
# Uses conditional type with MedianInterval for pattern-based detection
type: conditional
name: melite/dovecot-time-based-bf
description: "Detect time-based Dovecot bruteforce (evasive attacks)"
filter: "evt.Meta.log_type == 'dovecot_logs' && evt.Meta.dovecot_login_result == 'auth_failed'"
groupby: evt.Meta.source_ip
capacity: -1
condition: |
    len(queue.Queue) >= 4 &&
    MedianInterval(map(queue.Queue[-4:], {#.Time})) >= duration("20m")
leakspeed: 4h
blackhole: 5m
reprocess: true
labels:
  service: dovecot
  remediation: false
  confidence: 2
  spoofable: 0
  classification:
    - attack.T1110
  behavior: "pop3/imap:time-based-bruteforce"
  label: "Dovecot Time-Based Bruteforce"
---
# User enumeration variant
type: conditional
name: melite/dovecot-time-based-bf_user-enum
description: "Detect time-based Dovecot user enumeration (evasive attacks)"
filter: "evt.Meta.log_type == 'dovecot_logs' && evt.Meta.dovecot_login_result == 'auth_failed'"
groupby: evt.Meta.source_ip
distinct: evt.Parsed.dovecot_user
capacity: -1
condition: |
    len(queue.Queue) >= 4 &&
    MedianInterval(map(queue.Queue[-4:], {#.Time})) >= duration("20m")
leakspeed: 4h
blackhole: 5m
labels:
  service: dovecot
  remediation: false
  confidence: 2
  spoofable: 0
  classification:
    - attack.T1110
  behavior: "pop3/imap:user-enumeration"
  label: "Dovecot Time-Based User Enumeration"
